<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>座席表ジェネレーター</title>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* index.css content */
        :root {
            font-family: 'Inter', system-ui, Avenir, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            font-weight: 400;
            color-scheme: light dark;
            color: rgba(255, 255, 255, 0.87);
            background-color: #0f172a;
            font-synthesis: none;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            margin: 0;
            display: flex;
            place-items: center;
            min-width: 320px;
            min-height: 100vh;
        }

        #root {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
        }

        @media print {
            @page {
                size: A5 portrait;
                margin: 10mm;
            }
            body {
                background: white;
                color: black;
                display: block;
                min-height: auto;
            }
            #root {
                padding: 0;
                max-width: none;
            }
            .no-print {
                display: none !important;
            }
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }

        h1 {
            font-size: 3.2em;
            line-height: 1.1;
            background: linear-gradient(135deg, #60a5fa 0%, #a855f7 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
        }

        /* App.css content */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .input-area {
            margin-bottom: 2rem;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .instruction {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            text-align: left;
            line-height: 1.6;
            margin-bottom: 0.5rem;
        }

        .classroom-input {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: white;
            margin-bottom: 0.5rem;
        }

        .classroom-input label {
            white-space: nowrap;
        }

        .classroom-input input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            color: white;
            padding: 0.5rem;
            font-size: 1rem;
            flex: 1;
        }

        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            padding: 1rem;
            font-family: inherit;
            resize: vertical;
        }

        .warning {
            color: #fbbf24;
            font-size: 0.9rem;
            font-weight: 500;
            text-align: left;
        }

        .print-button {
            padding: 0.8rem 2rem;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .button-group {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .secondary-button {
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .secondary-button:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .print-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .seat-chart-area {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            position: relative;
            padding: 40px 0;
            margin-top: 20px;
            transition: transform 0.4s ease-in-out;
        }

        .seat-chart-area.is-flipped {
            flex-direction: column-reverse;
        }

        .is-flipped .seat-grid {
            transform: rotate(180deg);
        }

        .is-flipped .seat-slot {
            transform: rotate(180deg);
        }

        .is-flipped .classroom-name-display {
            top: auto;
            bottom: 0;
        }

        .classroom-name-display {
            position: absolute;
            top: 0;
            left: 0;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
        }

        @media print {
            .seat-chart-area {
                gap: 5mm;
                padding: 5mm 0;
                margin-top: 0;
                transition: none;
            }
            .classroom-name-display {
                color: black;
                position: static;
                margin-bottom: 5mm;
            }
        }

        .teachers-desk {
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 4px 24px;
            border-radius: 2px;
            font-weight: 600;
            font-size: 1rem;
            width: fit-content;
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        @media print {
            .teachers-desk {
                border: 1.5px solid black;
                color: black;
                background: none;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .container {
                max-width: none;
                margin: 0;
            }
        }

        /* SeatGrid.css content */
        .seat-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-template-rows: repeat(7, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        .seat-slot {
            aspect-ratio: 1 / 1.414;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .seat-slot:hover {
            transform: scale(1.02);
        }

        .empty-placeholder {
            width: 100%;
            height: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
        }

        .forced-empty .empty-placeholder {
            background: transparent;
            border: none;
        }

        @media print {
            .seat-grid {
                gap: 2mm;
                max-width: none;
            }
            .seat-slot {
                cursor: default;
                aspect-ratio: 1 / 1.35;
            }
            .seat-slot:hover {
                transform: none;
            }
            .empty-placeholder {
                border: 1px solid black;
                background: transparent !important;
                border-radius: 0;
            }
            .forced-empty .empty-placeholder {
                border: none;
                background: transparent !important;
            }
        }

        /* StudentCard.css content */
        .student-card {
            width: 100%;
            height: 100%;
            padding: 4px;
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-start;
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
            background: rgba(255, 255, 255, 0.05);
        }

        .card-side {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 10%;
            padding-left: 0;
        }

        .card-main {
            display: flex;
            flex-direction: row-reverse;
            flex: 1;
            padding-right: 0;
            height: 100%;
            gap: 0;
        }

        .number-box {
            width: 14px;
            height: 14px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 7pt;
            font-weight: bold;
            margin-bottom: 1px;
            padding: 0;
        }

        .female .number-box {
            background-color: #ef4444;
            color: white;
            border-color: #ef4444;
        }

        .reading-vertical,
        .surname-vertical,
        .firstname-vertical {
            writing-mode: vertical-rl;
            text-orientation: upright;
            line-height: 0.9;
        }

        .reading-vertical {
            font-size: 7pt;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0;
        }

        .reading-vertical.long-reading {
            font-size: 6pt;
        }

        .surname-vertical {
            font-size: 18pt;
            font-weight: 700;
            height: 100%;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            letter-spacing: 0;
            text-align: center;
        }

        .firstname-vertical {
            font-size: 8pt;
            font-weight: 500;
            margin-top: auto;
            padding-bottom: 1px;
            letter-spacing: 0;
        }

        @media print {
            .student-card {
                background: white !important;
                border: 1px solid black !important;
                color: black !important;
                backdrop-filter: none !important;
                -webkit-backdrop-filter: none !important;
                border-radius: 0;
            }
            
            .number-box {
                border: 1px solid black;
                color: black;
            }
            
            .female .number-box {
                background-color: #ff0000 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                color: white !important;
            }
            
            .reading-vertical {
                color: black;
            }
            
            .surname-vertical {
                font-size: 14pt;
            }
            
            .firstname-vertical,
            .reading-vertical,
            .number-box {
                font-size: 7pt;
            }
            
            .reading-vertical.long-reading {
                font-size: 6pt;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // StudentCard Component
        const StudentCard = ({ student }) => {
            const g = (student.gender || '').toLowerCase()
            const isFemale = g === 'f' || g === '女' || g === 'female'
            const reading = student.reading || ''
            const isLongReading = reading.length >= 5
            
            return (
                <div className={`student-card glass ${isFemale ? 'female' : 'male'}`}>
                    <div className="card-side">
                        <div className="number-box">{student.id}</div>
                        <div className={`reading-vertical ${isLongReading ? 'long-reading' : ''}`}>{reading}</div>
                    </div>
                    <div className="card-main">
                        <div className="surname-vertical">{student.lastName}</div>
                        <div className="firstname-vertical">{student.firstName}</div>
                    </div>
                </div>
            )
        }

        // SeatGrid Component
        const SeatGrid = ({ students, emptySeatIndices, onSeatClick }) => {
            const rows = 7
            const cols = 7
            const totalSeats = rows * cols

            const grid = Array(totalSeats).fill(null).map((_, i) => ({
                type: emptySeatIndices.includes(i) ? 'forced-empty' : 'empty'
            }))

            const availableIndices = [...Array(totalSeats).keys()]
                .filter(i => !emptySeatIndices.includes(i))
                .sort((a, b) => {
                    const colA = a % cols;
                    const rowA = Math.floor(a / cols);
                    const colB = b % cols;
                    const rowB = Math.floor(b / cols);
                    if (colA !== colB) return colA - colB;
                    return rowA - rowB;
                })

            students.forEach((student, idx) => {
                if (idx < availableIndices.length) {
                    grid[availableIndices[idx]] = { type: 'student', data: student }
                }
            })

            return (
                <div className="seat-grid">
                    {grid.map((slot, index) => (
                        <div 
                            key={index} 
                            className={`seat-slot ${slot.type}`}
                            onClick={() => onSeatClick(index)}
                        >
                            {slot.type === 'student' ? (
                                <StudentCard student={slot.data} />
                            ) : (
                                <div className="empty-placeholder">
                                </div>
                            )}
                        </div>
                    ))}
                </div>
            )
        }

        // App Component
        function App() {
            const [classroomName, setClassroomName] = useState('1年A組')
            const [studentText, setStudentText] = useState(`1,田中,太郎,タナカ,M
2,鈴木,次郎,スズキ,M
3,佐藤,三郎,サトウ,M
4,井上,和子,イノウエ,F
5,木村,美由紀,キムラ,F
6,加藤,直樹,カトウ,M
7,清水,香織,シミズ,F
8,山口,健一,ヤマグチ,M
9,林,昌子,ハヤシ,F
10,斎藤,洋介,サイトウ,M`)

            const [emptySeatIndices, setEmptySeatIndices] = useState([])
            const [isFlipped, setIsFlipped] = useState(false)

            const students = studentText.trim().split('\n').filter(l => l.trim()).map(line => {
                const [id, lastName, firstName, reading, gender] = line.split(',')
                return { id, lastName, firstName, reading, gender }
            })

            const toggleEmptySeat = (index) => {
                setEmptySeatIndices(prev => 
                    prev.includes(index) ? prev.filter(i => i !== index) : [...prev, index]
                )
            }

            const toggleFlip = () => setIsFlipped(!isFlipped)

            const totalSlots = 49 - emptySeatIndices.length
            const isOverLimit = students.length > totalSlots

            return (
                <div className="container">
                    <header className="no-print">
                        <h1>座席表ジェネレーター</h1>
                        <div className="input-area glass">
                            <p className="instruction">
                                1. 教室名と名簿を入力してください（出席番号,姓,名,読み,性別(M/F)）<br />
                                2. 下のグリッドで、<b>座らせたくない場所（空席）をクリック</b>して選択してください。<br />
                                3. 「A5サイズで印刷」ボタンで印刷（縦方向）してください。
                            </p>
                            <div className="classroom-input">
                                <label htmlFor="classroom-name">教室名：</label>
                                <input 
                                    id="classroom-name"
                                    type="text" 
                                    value={classroomName}
                                    onChange={(e) => setClassroomName(e.target.value)}
                                    placeholder="例: 1年A組"
                                />
                            </div>
                            <textarea 
                                value={studentText}
                                onChange={(e) => setStudentText(e.target.value)}
                                placeholder="出席番号,姓,名,読み,性別(M/F) の形式で入力"
                                rows={8}
                            />
                            {isOverLimit && (
                                <div className="warning">
                                    ⚠️ 座席が足りません。空席設定を減らすか、名簿を調整してください。
                                    ({students.length}名に対して、利用可能座席は{totalSlots}席です)
                                </div>
                            )}
                            <div className="button-group">
                                <button onClick={toggleFlip} className="secondary-button">
                                    教卓の位置を切り替え ({isFlipped ? '下' : '上'})
                                </button>
                                <button onClick={() => window.print()} className="print-button">
                                    A5サイズで印刷
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className={`seat-chart-area ${isFlipped ? 'is-flipped' : ''}`}>
                        <div className="classroom-name-display">{classroomName}</div>
                        <div className="teachers-desk">教卓</div>
                        <SeatGrid 
                            students={students} 
                            emptySeatIndices={emptySeatIndices} 
                            onSeatClick={toggleEmptySeat}
                        />
                    </main>

                    <footer className="no-print">
                        <p>※ 7×7のグリッドで表示されます（空席設定可能）</p>
                    </footer>
                </div>
            )
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
